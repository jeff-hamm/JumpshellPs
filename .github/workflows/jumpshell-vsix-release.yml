name: Publish JumpShell VSIX

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (example: v0.1.0). Defaults to package.json version.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish-vsix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: extensions/jumpshell/package-lock.json

      - name: Install dependencies
        working-directory: extensions/jumpshell
        run: npm ci

      - name: Resolve version and tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          PKG_VERSION="$(node -p "require('./extensions/jumpshell/package.json').version")"
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            # Tag push: version is authoritative from the tag, not package.json.
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          else
            INPUT_TAG="${{ github.event.inputs.tag }}"
            if [[ -n "${INPUT_TAG}" ]]; then
              TAG="${INPUT_TAG}"
              VERSION="${TAG#v}"
            else
              VERSION="${PKG_VERSION}"
              TAG="v${VERSION}"
            fi
          fi

          VSIX_NAME="jumpshell-${VERSION}.vsix"
          SHA_NAME="jumpshell-${VERSION}.vsix.sha256"
          VSIX_PATH="extensions/${VSIX_NAME}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "vsix_name=${VSIX_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_name=${SHA_NAME}" >> "$GITHUB_OUTPUT"
          echo "vsix_path=${VSIX_PATH}" >> "$GITHUB_OUTPUT"

      - name: Sync package.json version to tag
        working-directory: extensions/jumpshell
        run: npm version ${{ steps.vars.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Build VSIX
        working-directory: extensions/jumpshell
        run: npm run package -- --out ../${{ steps.vars.outputs.vsix_name }}

      - name: Generate SHA256
        shell: bash
        run: |
          set -euo pipefail
          sha256sum "${{ steps.vars.outputs.vsix_path }}" > "extensions/${{ steps.vars.outputs.sha_name }}"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: JumpShell ${{ steps.vars.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.vars.outputs.vsix_path }}
            extensions/${{ steps.vars.outputs.sha_name }}

      - name: Check marketplace publish conditions
        id: publish_check
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          if [[ -n "${VSCE_PAT}" ]]; then
            echo "has_pat=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pat=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to VS Code Marketplace
        if: steps.publish_check.outputs.has_pat == 'true'
        working-directory: extensions/jumpshell
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath ../${{ steps.vars.outputs.vsix_name }}
